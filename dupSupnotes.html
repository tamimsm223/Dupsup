<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonFlow Ultra - Mobile Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00f3ff; --panel: rgba(15, 15, 25, 0.98); }
        body { margin: 0; background: #050508; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        .dashboard {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--panel); border-bottom: 2px solid #333;
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 5px; z-index: 1000; overflow-x: auto; white-space: nowrap;
        }
        .tool-group { display: flex; gap: 5px; align-items: center; background: rgba(255,255,255,0.05); padding: 5px 8px; border-radius: 12px; margin-right: 10px; }
        .btn {
            background: transparent; border: none; color: #777; font-size: 14px;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 45px;
        }
        .btn span { font-size: 7px; text-transform: uppercase; }
        .btn:hover, .btn.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .status-pill { background: #000; padding: 3px 8px; border-radius: 15px; border: 1px solid #444; font-size: 10px; color: var(--neon); }
        canvas { margin-top: 70px; }
        /* Hide scrollbar for dashboard */
        .dashboard::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="tool-group">
        <button class="btn active" id="penM" onclick="setMode('pen')"><i class="fas fa-pen"></i><span>Pen</span></button>
        <button class="btn" id="highM" onclick="setMode('high')"><i class="fas fa-marker" style="color:#ff0"></i><span>High</span></button>
        <button class="btn" id="eraserM" onclick="setMode('eraser')"><i class="fas fa-eraser"></i><span>Eraser</span></button>
    </div>

    <div class="tool-group">
        <input type="range" id="sizeW" min="1" max="50" value="3" oninput="updateBrush()">
        <input type="color" id="colorP" value="#00f3ff" onchange="updateBrush()" style="width:20px;height:20px;">
    </div>

    <div class="tool-group">
        <input type="file" id="pdfInp" hidden accept="application/pdf">
        <button class="btn" onclick="document.getElementById('pdfInp').click()"><i class="fas fa-file-pdf"></i><span>PDF</span></button>
        <button class="btn" onclick="addNewPage()"><i class="fas fa-plus"></i><span>New</span></button>
        <button class="btn" onclick="deleteActive()" style="color:#ff4757"><i class="fas fa-trash"></i><span>Clear</span></button>
    </div>

    <div class="tool-group">
        <button class="btn" onclick="prevPage()"><i class="fas fa-chevron-left"></i></button>
        <div class="status-pill" id="pLabel">1/1</div>
        <button class="btn" onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth,
        height: window.innerHeight - 70,
        backgroundColor: '#050508',
        isDrawingMode: true,
        allowTouchScrolling: false // টাচ করার সময় পেজ যেন না নড়ে
    });

    // মোবাইল সাপোর্ট ফিক্স
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#00f3ff',
        cornerStyle: 'circle',
        borderColor: '#00f3ff',
        cornerSize: 12
    });

    let pages = [null]; let currentPage = 0; let currentMode = 'pen';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    function updateBrush() {
        let size = document.getElementById('sizeW').value;
        let color = document.getElementById('colorP').value;
        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
        canvas.freeDrawingBrush.width = parseInt(size, 10);
        if (currentMode === 'high') {
            canvas.freeDrawingBrush.color = color + '55';
            canvas.freeDrawingBrush.width = 25;
        } else {
            canvas.freeDrawingBrush.color = color;
        }
    }

    function setMode(mode) {
        currentMode = mode;
        canvas.isDrawingMode = (mode === 'pen' || mode === 'high');
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode + 'M').classList.add('active');
        if(canvas.isDrawingMode) updateBrush();
    }

    // মুভমেন্ট এবং প্যানিং (মোবাইলের জন্য বিশেষ লজিক)
    let isDragging = false;
    canvas.on('mouse:down', (opt) => {
        if (currentMode === 'eraser' && opt.target) {
            canvas.remove(opt.target);
        }
    });

    function saveState() { pages[currentPage] = JSON.stringify(canvas); }
    function addNewPage() { saveState(); pages.push(null); currentPage = pages.length - 1; canvas.clear(); canvas.setBackgroundColor('#050508', updateUI); }
    function nextPage() { if (currentPage < pages.length - 1) { saveState(); currentPage++; loadPage(); } }
    function prevPage() { if (currentPage > 0) { saveState(); currentPage--; loadPage(); } }
    
    function loadPage() {
        canvas.clear();
        canvas.setBackgroundColor('#050508', () => {
            if (pages[currentPage]) {
                canvas.loadFromJSON(pages[currentPage], () => {
                    canvas.requestRenderAll();
                });
            }
            updateUI();
        });
    }

    function deleteActive() { canvas.clear(); canvas.setBackgroundColor('#050508', () => canvas.requestRenderAll()); }
    function updateUI() { document.getElementById('pLabel').innerText = `${currentPage + 1}/${pages.length}`; }
    
    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: window.innerWidth, height: window.innerHeight - 70 });
    });
    
    updateBrush();
</script>
</body>
</html>
